backend:
  name: github
  repo: krumbunny/chin-purcell-site
  branch: main
  # base_url: https://YOUR-WORKER-SUBDOMAIN.workers.dev # <-- update after Cloudflare Worker OAuth setup

media_folder: "src/images/uploads"
public_folder: "/images/uploads"

media_libraries:
  cloudflare_r2:
    access_key_id: c833555510946f0a5e0d04786fef3336
    bucket: images-kenchinpurcell-com
    account_id: 07862289b39575b6bc78d149b6a3f28c
    public_url: https://images.kenchinpurcell.com

collections:
  - name: "posts"
    label: "Posts"
    folder: "src/content/posts"
    create: true
    slug: "{{slug}}"
    identifier_field: title
    fields: &post_fields
      - { label: "Title", name: "title", widget: "string" }
      - {
          label: "Date",
          name: "date",
          widget: "datetime",
          format: "YYYY-MM-DD",
        }
      - label: "Category"
        name: "category"
        widget: "select"
        options: ["pottery", "travel", "cooking", "misc"]
        multiple: true
        min: 0
        required: false
      - {
          label: "Hero Image",
          name: "heroImage",
          widget: "image",
          required: false,
        }
      - {
          label: "Hero Image Alt Text",
          name: "heroImageAlt",
          widget: "string",
          required: false,
        }
      - { label: "Tags", name: "tags", widget: "list", required: false }
      - {
          label: "Description (for SEO/social previews)",
          name: "description",
          widget: "text",
          required: false,
        }
      - { label: "Body", name: "body", widget: "markdown" }

  # Sveltia's folder collections only list files directly inside `folder` —
  # they don't recurse into subfolders. Each trip below needs its own
  # collection pointed at its subfolder so Sveltia can see/edit those posts.
  # Add a new block here (copy one of these) whenever a new trip subfolder
  # is created under src/content/posts/travel/.
  - name: "posts_travel"
    label: "Travel"
    folder: "src/content/posts/travel"
    create: true
    slug: "{{slug}}"
    identifier_field: title
    fields: *post_fields

  - name: "pages"
    label: "Fixed Pages"
    files:
      - label: "Pottery Page Intro"
        name: "pottery"
        file: "src/pottery/index.md"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - {
              label: "Hero Image",
              name: "heroImage",
              widget: "image",
              required: false,
            }
          - {
              label: "Hero Image Alt Text",
              name: "heroImageAlt",
              widget: "string",
              required: false,
            }
          - { label: "Intro Text", name: "body", widget: "markdown" }
      - label: "Travel Page Intro"
        name: "travel"
        file: "src/travel/index.md"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - {
              label: "Hero Image",
              name: "heroImage",
              widget: "image",
              required: false,
            }
          - {
              label: "Hero Image Alt Text",
              name: "heroImageAlt",
              widget: "string",
              required: false,
            }
          - { label: "Intro Text", name: "body", widget: "markdown" }
      - label: "Cooking Page Intro"
        name: "cooking"
        file: "src/cooking/index.md"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - {
              label: "Hero Image",
              name: "heroImage",
              widget: "image",
              required: false,
            }
          - {
              label: "Hero Image Alt Text",
              name: "heroImageAlt",
              widget: "string",
              required: false,
            }
          - { label: "Intro Text", name: "body", widget: "markdown" }
      - label: "Contact Page"
        name: "contact"
        file: "src/contact/index.md"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Body", name: "body", widget: "markdown" }
